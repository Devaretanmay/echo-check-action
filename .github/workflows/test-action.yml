name: test-action
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: Devaretanmay/echo-check-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_findings: false
          comment_on_pr: false
          max_findings: 5
          echo_check_version: v0.1.0-beta.2
